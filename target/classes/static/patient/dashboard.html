<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="layout">

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <p id="patientName"></p>
            <p id="healthId" class="sidebar-health-id"></p>
            <a href="/patient/dashboard.html">Dashboard</a>
            <a href="/patient/book-test.html">Book a Test</a>
            <a href="/patient/my-reports.html">My Reports</a>
            <a href="#" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>

        </div>

        <div class="main-content">
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">Patient Dashboard</span>
            </div>

            <h2>Welcome to Patient Dashboard</h2>
            <br>
            <div class="cards">
                <div class="card">
                    <h3 id="totalBookings">0</h3>
                    <p>My Bookings</p>
                </div>
                <div class="card">
                    <h3 id="totalReports">0</h3>
                    <p>My Reports</p>
                </div>
            </div>

            <h3>My Recent Bookings</h3>
            <br>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Test Name</th>
                            <th>Booking Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token     = localStorage.getItem('token');
        const role      = localStorage.getItem('role');
        const name      = localStorage.getItem('name');
        const userEmail = localStorage.getItem('userEmail') || '';
        const headers   = { 'Authorization': 'Bearer ' + token };

        if (!token || role !== 'PATIENT') window.location.href = '/login.html';

        document.getElementById('patientName').innerText = 'Hello, ' + name;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        fetch('/api/patient/profile?email=' + userEmail, { headers })
            .then(r => r.json())
            .then(user => {
                if (user.healthId) {
                    document.getElementById('healthId').innerText = '🪪 Health ID: ' + user.healthId;
                }
            });

        async function loadDashboard() {
            const bookings = await fetch('/api/patient/bookings?email=' + userEmail, { headers }).then(r => r.json());
            const reports  = await fetch('/api/patient/reports?email='  + userEmail, { headers }).then(r => r.json());

            document.getElementById('totalBookings').innerText = bookings.length;
            document.getElementById('totalReports').innerText  = reports.length;

            const tbody = document.getElementById('bookingsTable');
            tbody.innerHTML = '';
            bookings.forEach(booking => {
              tbody.innerHTML += `
    <tr>
        <td>${booking.test.testName}</td>
        <td>${booking.bookingDate}</td>
        <td>${booking.status}</td>
        <td>
            ${booking.status === 'PENDING' || booking.status === 'BOOKED' || booking.status === 'CONFIRMED' ?
                  `<button class="btn" style="background:red; padding:5px 10px; font-size:12px; margin-right:5px;"
    onclick="cancelBooking(${booking.id})">Cancel</button>` : ''}
${booking.status === 'BOOKED' ?
                  `<button class="btn" style="background:green; padding:5px 10px; font-size:12px;"
        onclick="payNow(${booking.id})">Pay Now</button>` : ''}
${booking.status === 'PAID' ? '✅ Paid' : ''}
${booking.status === 'CANCELLED' ? '❌ Cancelled' : ''}
        </td>
    </tr>`;
            });
        }

        function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkModeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
}

if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkModeBtn').innerText = '☀️ Light Mode';
}

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadDashboard();

        async function cancelBooking(bookingId) {
    if (!confirm('Are you sure you want to cancel this booking?')) return;
    const response = await fetch('/api/patient/bookings/' + bookingId + '/cancel?email=' + userEmail, {
        method: 'PUT',
        headers
    });
    if (response.ok) {
        alert('Booking cancelled successfully!');
        loadDashboard();
    } else {
        const err = await response.json();
        alert(err.message);
    }
}

        async function payNow(bookingId) {
            const res = await fetch('/api/payment/create-order/' + bookingId, {
                method: 'POST', headers
            });
            const order = await res.json();

            const options = {
                key: order.keyId,
                amount: order.amount,
                currency: order.currency,
                name: 'DiagnoCare',
                description: order.testName,
                order_id: order.orderId,
                handler: async function(response) {
                    const verify = await fetch('/api/payment/verify/' + bookingId +
                        '?razorpayPaymentId=' + response.razorpay_payment_id +
                        '&razorpayOrderId=' + response.razorpay_order_id +
                        '&razorpaySignature=' + response.razorpay_signature, {
                        method: 'POST', headers
                    });
                    if (verify.ok) {
                        alert('Payment successful!');
                        loadDashboard();
                    }
                },
                prefill: {
                    name: order.patientName,
                    email: order.patientEmail
                },
                theme: { color: '#0A6EBD' }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        }
    </script>
</body>
</html>
