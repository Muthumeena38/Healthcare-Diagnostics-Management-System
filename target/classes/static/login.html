<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoCare - Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1> DiagnoCare</h1>
            <h2>Login</h2>

            <div id="error-msg" class="error-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
               <div class="form-group">
    <label>Password</label>
    <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter your password" required>
        <button type="button" class="eye-btn" onclick="togglePass('password', 'eyeLogin')">
            <svg id="eyeLogin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
        </button>
    </div>
</div>
                <button type="submit" class="btn">Login</button>
            </form>

            <p>Don't have an account? <a href="/register.html">Register</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);
                    localStorage.setItem('userEmail',email);

                    if (data.role === 'ADMIN') window.location.href = '/admin/dashboard.html';
                    if (data.role === 'PATIENT') window.location.href = '/patient/dashboard.html';
                    if (data.role === 'DOCTOR') window.location.href = '/doctor/dashboard.html';

                } else {
                     const err = await response.json();
                     document.getElementById('error-msg').innerText = err.message || 'Invalid email or password!';
                }

            } catch (error) {
                document.getElementById('error-msg').innerText = 'Something went wrong!';
            }
        });

        function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const svg = document.getElementById(iconId);
    const eyeOff = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    const eyeOn = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    if (input.type === 'password') { input.type = 'text'; svg.innerHTML = eyeOn; }
    else { input.type = 'password'; svg.innerHTML = eyeOff; }
}
    </script>
</body>
</html>
