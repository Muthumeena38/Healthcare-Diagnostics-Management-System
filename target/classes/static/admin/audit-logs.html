<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audit Logs</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h2>DiagnoCare</h2>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/reports.html">Reports</a>
        <a href="/admin/verify-doctors.html">Verify Doctors</a>
        <a href="/admin/audit-logs.html">Audit Logs</a>
        <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
    </div>
    <div class="main-content">
        <h2>Doctor Audit Logs</h2>
        <br>
        <table>
            <thead>
                <tr>
                    <th>Doctor</th>
                    <th>Patient</th>
                    <th>Health ID</th>
                    <th>Viewed At</th>
                </tr>
            </thead>
            <tbody id="logsTable"></tbody>
        </table>
    </div>
</div>
<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'ADMIN') window.location.href = '/login.html';

    const headers = { 'Authorization': 'Bearer ' + token };

    fetch('/api/admin/audit-logs', { headers })
        .then(r => r.json())
        .then(logs => {
            const tbody = document.getElementById('logsTable');
            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">No logs yet</td></tr>';
                return;
            }
            logs.forEach(log => {
                tbody.innerHTML += `
                    <tr>
                        <td>${log.doctor.name}</td>
                        <td>${log.patient.name}</td>
                        <td>${log.patient.healthId}</td>
                        <td>${log.viewedAt}</td>
                    </tr>`;
            });
        });

    function logout() {
        localStorage.clear();
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
