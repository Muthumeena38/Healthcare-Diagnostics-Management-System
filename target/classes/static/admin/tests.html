<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tests</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <a href="/admin/dashboard.html">Dashboard</a>
            <a href="/admin/tests.html">Manage Tests</a>
            <a href="/admin/reports.html">Manage Reports</a>
            <a href="/admin/bookings.html">Manage Bookings</a>
            <a href="/admin/users.html">Manage Users</a>
            <a href="/admin/verify-doctors.html">Verify Doctors</a>
            <a href="/admin/audit-logs.html">Audit Logs</a>
            <a href="#" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>

        </div>

        <div class="main-content">
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">Manage Tests</span>
            </div>

            <h2>Manage Tests</h2>
            <br>

            <!-- Add Test Form -->
            <div class="form-card">
                <h3>Add New Test</h3>
                <br>
                <div class="form-group">
                    <label>Test Name</label>
                    <input type="text" id="testName" placeholder="Enter test name">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="price" placeholder="Enter price">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="category" placeholder="Enter category">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="Enter description">
                </div>
                <button class="btn" onclick="addTest()">Add Test</button>
            </div>

            <!-- Tests Table -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Test Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="testsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token = localStorage.getItem('token');
        const role  = localStorage.getItem('role');
        if (!token || role !== 'ADMIN') window.location.href = '/login.html';

        const headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        async function loadTests() {
            const tests = await fetch('/api/admin/tests', { headers }).then(r => r.json());
            const tbody = document.getElementById('testsTable');
            tbody.innerHTML = '';
            tests.forEach(test => {
                tbody.innerHTML += `
                    <tr>
                        <td>${test.id}</td>
                        <td>${test.testName}</td>
                        <td>₹${test.price}</td>
                        <td>${test.category}</td>
                        <td>${test.isActive ? 'Active' : 'Inactive'}</td>
                        <td>
                            <button class="btn btn-sm btn-danger"
                                onclick="deleteTest(${test.id})">Delete</button>
                        </td>
                    </tr>`;
            });
        }

        async function addTest() {
            const testName   = document.getElementById('testName').value;
            const price      = document.getElementById('price').value;
            const category   = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            await fetch('/api/admin/tests', {
                method: 'POST',
                headers,
                body: JSON.stringify({ testName, price, category, description, isActive: true })
            });
            loadTests();
        }

        async function deleteTest(id) {
            await fetch('/api/admin/tests/' + id, { method: 'DELETE', headers });
            loadTests();
        }

        function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkModeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
}

if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkModeBtn').innerText = '☀️ Light Mode';
}

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadTests();
    </script>
</body>
</html>
