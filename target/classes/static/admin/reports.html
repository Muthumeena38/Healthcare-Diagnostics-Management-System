<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reports</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2> DiagnoCare</h2>
            <a href="/admin/dashboard.html"> Dashboard</a>
            <a href="/admin/tests.html"> Manage Tests</a>
            <a href="/admin/reports.html"> Manage Reports</a>
            <a href="/admin/bookings.html"> Manage Bookings</a>
            <a href="/admin/users.html"> Manage Users</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
        </div>

        <div class="main-content">
            <h2> Manage Reports</h2>
            <br>

            <!-- Upload Report Form -->
            <div class="auth-box" style="text-align:left; margin-bottom:30px;">
                <h3>Upload Report</h3>
                <br>
                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="number" id="patientId" placeholder="Enter patient ID">
                </div>
                <div class="form-group">
                    <label>Test ID</label>
                    <input type="number" id="testId" placeholder="Enter test ID">
                </div>
                <div class="form-group">
                    <label>Remarks</label>
                    <input type="text" id="remarks" placeholder="Enter remarks">
                </div>
                <div class="form-group">
                    <label>Report File (PDF)</label>
                    <input type="file" id="reportFile" accept=".pdf">
                </div>
                <button class="btn" onclick="uploadReport()">Upload Report</button>
                <div id="upload-msg" class="success-msg"></div>
            </div>

            <!-- Reports Table -->
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Test</th>
                        <th>Uploaded By</th>
                        <th>Date</th>
                        <th>Remarks</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="reportsTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        if (!token || role !== 'ADMIN') {
            window.location.href = '/login.html';
        }

        const headers = {
            'Authorization': 'Bearer ' + token
        };

        async function loadReports() {
            const reports = await fetch('/api/admin/reports', { headers }).then(r => r.json());
            const tbody = document.getElementById('reportsTable');
            tbody.innerHTML = '';
            reports.forEach(report => {
                tbody.innerHTML += `
                    <tr>
                        <td>${report.id}</td>
                        <td>${report.patient.name}</td>
                        <td>${report.test.testName}</td>
                        <td>${report.uploadedBy.name}</td>
                        <td>${report.uploadDate ? report.uploadDate : 'N/A'}</td>
                        <td>${report.remarks ? report.remarks : 'N/A'}</td>
                        <td>
                            <button class="btn" style="background:red; padding:5px 10px;"
                                onclick="deleteReport(${report.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function uploadReport() {
            const patientId = document.getElementById('patientId').value;
            const testId = document.getElementById('testId').value;
            const remarks = document.getElementById('remarks').value;
            const file = document.getElementById('reportFile').files[0];

            const formData = new FormData();
            formData.append('patientId', patientId);
            formData.append('testId', testId);
            formData.append('remarks', remarks);
            formData.append('file', file);

            const response = await fetch('/api/admin/reports/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });

            if (response.ok) {
                document.getElementById('upload-msg').innerText = 'Report uploaded successfully!';
                loadReports();
            }
        }

        async function deleteReport(id) {
            await fetch('/api/admin/reports/' + id, {
                method: 'DELETE',
                headers
            });
            loadReports();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadReports();
    </script>
</body>
</html>
