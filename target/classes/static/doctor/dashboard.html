<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2> DiagnoCare</h2>
            <p id="doctorName"></p>
            <br>
            <a href="/doctor/dashboard.html"> Dashboard</a>
            <a href="/doctor/view-reports.html"> View Reports</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
        </div>

        <div class="main-content">
            <h2>Welcome to Doctor Dashboard</h2>
            <br>
            <div class="cards">
                <div class="card">
                    <h3 id="totalReports">0</h3>
                    <p>Total Reports</p>
                </div>
                <div class="card">
                    <h3 id="remarkedReports">0</h3>
                    <p>Remarked Reports</p>
                </div>
            </div>

            <h3>Recent Reports</h3>
            <br>
            <table>
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Test</th>
                        <th>Upload Date</th>
                        <th>Remark Status</th>
                    </tr>
                </thead>
                <tbody id="reportsTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const name = localStorage.getItem('name');

        if (!token || role !== 'DOCTOR') {
            window.location.href = '/login.html';
        }

        document.getElementById('doctorName').innerText = 'Hello, Dr. ' + name;

        const headers = { 'Authorization': 'Bearer ' + token };

        async function loadDashboard() {
            const reports = await fetch('/api/doctor/reports', { headers }).then(r => r.json());

            document.getElementById('totalReports').innerText = reports.length;

            const remarked = reports.filter(r => r.doctorRemark !== null).length;
            document.getElementById('remarkedReports').innerText = remarked;

            const tbody = document.getElementById('reportsTable');
            tbody.innerHTML = '';
            reports.forEach(report => {
                tbody.innerHTML += `
                    <tr>
                        <td>${report.patient.name}</td>
                        <td>${report.test.testName}</td>
                        <td>${report.uploadDate ? report.uploadDate : 'N/A'}</td>
                        <td>${report.doctorRemark ? '✅ Remarked' : '⏳ Pending'}</td>
                    </tr>
                `;
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadDashboard();
    </script>
</body>
</html>
