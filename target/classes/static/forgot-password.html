<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - DiagnoCare</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container">
    <div class="auth-box">
        <h1>DiagnoCare</h1>
        <h2>Forgot Password</h2>
        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your registered email">
        </div>
        <button class="btn" onclick="sendResetLink()">Send Reset Link</button>
        <p><a href="/login.html">Back to Login</a></p>
    </div>
</div>
<script>
    async function sendResetLink() {
        const email = document.getElementById('email').value;
        if (!email) { alert('Please enter your email'); return; }

        const response = await fetch('/api/auth/forgot-password?email=' + email, {
            method: 'POST'
        });
        const data = await response.json();
        if (response.ok) {
            document.getElementById('success-msg').innerText = data.message;
            document.getElementById('error-msg').innerText = '';
        } else {
            document.getElementById('error-msg').innerText = data.message;
            document.getElementById('success-msg').innerText = '';
        }
    }
</script>
</body>
</html>
