<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Diagnocare-Register</title>
        <link rel="stylesheet" href="/css/styles.css">
    </head>
    <body>
        <div class="container">
            <h1>Diagnocare</h1>
            <h2>Register</h2>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="text" id="name" placeholder="Enter your email" required>
                </div>

                <div> class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                 <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="PATIENT">Patient</option>
                        <option value="DOCTOR">Doctor</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            <p>Already have an account?<a href="/login.html">Login</a></p>
            </div>

        </div>

        <script>
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                if (response.ok) {
                    const data = await response.json();

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);

                    document.getElementById('success-msg').innerText = 'Registration successful! Redirecting...';

                    setTimeout(() => {
                        if (data.role === 'ADMIN') window.location.href = '/admin/dashboard.html';
                        if (data.role === 'PATIENT') window.location.href = '/patient/dashboard.html';
                        if (data.role === 'DOCTOR') window.location.href = '/doctor/dashboard.html';
                    }, 1000);

                } else {
                    document.getElementById('error-msg').innerText = 'Registration failed! Email may already exist.';
                }

            } catch (error) {
                document.getElementById('error-msg').innerText = 'Something went wrong!';
            }
        });
        </script>
    </body>
</html>
