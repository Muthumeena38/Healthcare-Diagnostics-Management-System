<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Diagnocare-Register</title>
        <link rel="stylesheet" href="/css/styles.css">
    </head>
    <body>
        <div class="container">
            <h1>Diagnocare</h1>
             <div class="auth-box">
            <h2>Register</h2>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

              <div class="form-group">
    <label>Password</label>
    <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter your password" required>
        <button type="button" class="eye-btn" onclick="togglePass('password', 'eyeReg')">
            <svg id="eyeReg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
        </button>
    </div>
</div>
              <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone" placeholder="Enter your phone number" maxlength="10">
             </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" onchange="toggleDoctorFields()">
                        <option value="PATIENT">Patient</option>
                        <option value="DOCTOR">Doctor</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>

                <!-- Doctor only fields -->
                <div id="doctorFields" style="display:none">
                    <div class="form-group">
                        <label>Medical License Number</label>
                        <input type="text" id="licenseNumber" placeholder="Enter your license number">
                    </div>
                    <div class="form-group">
                        <label>Specialization</label>
                        <input type="text" id="specialization" placeholder="e.g. Cardiologist, Dermatologist">
                    </div>
                </div>

                <button type="submit" class="btn">Register</button>
            </form>
            <p>Already have an account? <a href="/login.html">Login</a></p>
            </div>
        </div>

        <script>
            function toggleDoctorFields() {
                const role = document.getElementById('role').value;
                document.getElementById('doctorFields').style.display = 
                    role === 'DOCTOR' ? 'block' : 'none';
            }

            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const role = document.getElementById('role').value;
                const phone = document.getElementById('phone').value;
                const licenseNumber = document.getElementById('licenseNumber').value;
                const specialization = document.getElementById('specialization').value;

                try {
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                       body: JSON.stringify({ name, email, password, role, phone, licenseNumber, specialization })
                    });

                    if (response.ok) {
                        const data = await response.json();

                        // Doctor is pending approval
                        if (data.status === 'PENDING') {
                            document.getElementById('success-msg').innerText = 
                                'Registration successful! Your account is pending admin approval.';
                            return;
                        }

                        localStorage.setItem('token', data.token);
                        localStorage.setItem('role', data.role);
                        localStorage.setItem('name', data.name);

                        document.getElementById('success-msg').innerText = 'Registration successful! Redirecting...';

                        setTimeout(() => {
                            if (data.role === 'ADMIN') window.location.href = '/admin/dashboard.html';
                            if (data.role === 'PATIENT') window.location.href = '/patient/dashboard.html';
                            if (data.role === 'DOCTOR') window.location.href = '/doctor/dashboard.html';
                        }, 1000);

                    } else {
                        const err = await response.json();
                        document.getElementById('error-msg').innerText = err.message || 'Registration failed!';
                    }

                } catch (error) {
                    document.getElementById('error-msg').innerText = 'Something went wrong!';
                }
            });

            function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const svg = document.getElementById(iconId);
    const eyeOff = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    const eyeOn = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    if (input.type === 'password') { input.type = 'text'; svg.innerHTML = eyeOn; }
    else { input.type = 'password'; svg.innerHTML = eyeOff; }
}
        </script>
    </body>
</html>
