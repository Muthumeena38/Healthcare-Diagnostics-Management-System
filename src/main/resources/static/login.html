<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoCare - Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1> DiagnoCare</h1>
            <h2>Login</h2>

            <div id="error-msg" class="error-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>

            <p>Don't have an account? <a href="/register.html">Register</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);
                    localStorage.setItem('userEmail', email);

                    if (data.role === 'ADMIN') window.location.href = '/admin/dashboard.html';
                    if (data.role === 'PATIENT') window.location.href = '/patient/dashboard.html';
                    if (data.role === 'DOCTOR') window.location.href = '/doctor/dashboard.html';

                } else {
                    document.getElementById('error-msg').innerText = 'Invalid email or password!';
                }

            } catch (error) {
                document.getElementById('error-msg').innerText = 'Something went wrong!';
            }
        });
    </script>
</body>
</html>
