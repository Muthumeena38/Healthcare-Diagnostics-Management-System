<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Test</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <p id="patientName"></p>
            <a href="/patient/dashboard.html">Dashboard</a>
            <a href="/patient/book-test.html">Book a Test</a>
            <a href="/patient/my-reports.html">My Reports</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
        </div>

        <div class="main-content">
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">Book a Test</span>
            </div>

            <h2>Book a Test</h2>
            <br>

            <div id="success-msg" class="success-msg"></div>
            <div id="error-msg"   class="error-msg"></div>

            <!-- Test cards grid -->
            <div class="cards" id="testsContainer"></div>

            <!-- Booking Form -->
            <div class="form-card" style="margin-top:24px;">
                <h3>Confirm Booking</h3>
                <br>
                <div class="form-group">
                    <label>Selected Test</label>
                    <input type="text" id="selectedTest" readonly>
                    <input type="hidden" id="selectedTestId">
                </div>
                <div class="form-group">
                    <label>Booking Date</label>
                    <input type="date" id="bookingDate">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" id="notes" placeholder="Any special notes">
                </div>
                <button class="btn" onclick="bookTest()">Confirm Booking</button>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token     = localStorage.getItem('token');
        const role      = localStorage.getItem('role');
        const name      = localStorage.getItem('name');
        const userEmail = localStorage.getItem('userEmail');
        const headers   = { 'Authorization': 'Bearer ' + token };

        if (!token || role !== 'PATIENT') window.location.href = '/login.html';

        document.getElementById('patientName').innerText = 'Hello, ' + name;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        async function loadTests() {
            const tests     = await fetch('/api/patient/tests', { headers }).then(r => r.json());
            const container = document.getElementById('testsContainer');
            container.innerHTML = '';
            tests.forEach(test => {
                container.innerHTML += `
                    <div class="card test-card" onclick="selectTest(${test.id}, '${test.testName}')">
                        <h3>₹${test.price}</h3>
                        <p><strong>${test.testName}</strong></p>
                        <p>${test.category}</p>
                        <p class="test-desc">${test.description}</p>
                    </div>`;
            });
        }

        function selectTest(id, testName) {
            document.getElementById('selectedTestId').value = id;
            document.getElementById('selectedTest').value   = testName;
            document.querySelectorAll('.test-card').forEach(c => c.classList.remove('test-card-selected'));
            event.currentTarget.classList.add('test-card-selected');
        }

        async function bookTest() {
            const testId      = document.getElementById('selectedTestId').value;
            const bookingDate = document.getElementById('bookingDate').value;
            const notes       = document.getElementById('notes').value;

            if (!testId)      { document.getElementById('error-msg').innerText = 'Please select a test!'; return; }
            if (!bookingDate) { document.getElementById('error-msg').innerText = 'Please select a date!'; return; }

            const response = await fetch('/api/patient/book-test/' + testId + '?email=' + userEmail, {
                method: 'POST',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookingDate, notes })
            });

            if (response.ok) {
                document.getElementById('success-msg').innerText = 'Test booked successfully!';
                document.getElementById('error-msg').innerText   = '';
                setTimeout(() => window.location.href = '/patient/dashboard.html', 1500);
            } else {
                document.getElementById('error-msg').innerText = 'Booking failed!';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadTests();
    </script>
</body>
</html>
