<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <p id="patientName"></p>
            <a href="/patient/dashboard.html">Dashboard</a>
            <a href="/patient/book-test.html">Book a Test</a>
            <a href="/patient/my-reports.html">My Reports</a>
            <a href="#" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>

        </div>

        <div class="main-content">
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">My Reports</span>
            </div>

            <h2>My Reports</h2>
            <br>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Test Name</th>
                            <th>Upload Date</th>
                            <th>Remarks</th>
                            <th>Doctor</th>
                            <th>Doctor Remark</th>
                            <th>Report</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token     = localStorage.getItem('token');
        const role      = localStorage.getItem('role');
        const name      = localStorage.getItem('name');
        const userEmail = localStorage.getItem('userEmail');
        const headers   = { 'Authorization': 'Bearer ' + token };

        if (!token || role !== 'PATIENT') window.location.href = '/login.html';

        document.getElementById('patientName').innerText = 'Hello, ' + name;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        async function loadReports() {
            const reports = await fetch('/api/patient/reports?email=' + userEmail, { headers }).then(r => r.json());
            const tbody   = document.getElementById('reportsTable');
            tbody.innerHTML = '';

            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No reports found</td></tr>';
                return;
            }

            reports.forEach(report => {
             tbody.innerHTML += `
    <tr>
        <td>${booking.test.testName}</td>
        <td>${booking.bookingDate}</td>
        <td>${booking.status}</td>
        <td>
            ${booking.status === 'PENDING' || booking.status === 'BOOKED' ? 
            `<button class="btn" style="background:red; padding:5px 10px; font-size:12px;"
                onclick="cancelBooking(${booking.id})">Cancel</button>` : '-'}
        </td>
    </tr>`;
            });
        }

        function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkModeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
}

     if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkModeBtn').innerText = '☀️ Light Mode';
}

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadReports();

        async function cancelBooking(bookingId) {
    if (!confirm('Are you sure you want to cancel this booking?')) return;
    const response = await fetch('/api/patient/bookings/' + bookingId + '/cancel?email=' + userEmail, {
        method: 'PUT',
        headers
    });
    if (response.ok) {
        alert('Booking cancelled successfully!');
        loadDashboard();
    } else {
        const err = await response.json();
        alert(err.message);
    }
}
    </script>
</body>
</html>
