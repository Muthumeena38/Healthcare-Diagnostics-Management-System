<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>🏥 DiagnoCare</h2>
            <a href="/admin/dashboard.html">📊 Dashboard</a>
            <a href="/admin/tests.html">🧪 Manage Tests</a>
            <a href="/admin/reports.html">📋 Manage Reports</a>
            <a href="/admin/bookings.html">📅 Manage Bookings</a>
            <a href="/admin/users.html">👥 Manage Users</a>
            <a href="/admin/verify-doctors.html"> Verify Doctors</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
        </div>

        <div class="main-content">
            <h2>👥 Manage Users</h2>
            <br>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');

        if (!token || role !== 'ADMIN') {
            window.location.href = '/login.html';
        }

        const headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        async function loadUsers() {
            const users = await fetch('/api/admin/users', { headers }).then(r => r.json());
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            users.forEach(user => {
                tbody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.role}</td>
                        <td>${user.createdAt ? user.createdAt : 'N/A'}</td>
                    </tr>
                `;
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadUsers();
    </script>
</body>
</html>
