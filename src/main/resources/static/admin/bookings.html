<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <a href="/admin/dashboard.html">Dashboard</a>
            <a href="/admin/tests.html">Manage Tests</a>
            <a href="/admin/reports.html">Manage Reports</a>
            <a href="/admin/bookings.html">Manage Bookings</a>
            <a href="/admin/users.html">Manage Users</a>
            <a href="/admin/verify-doctors.html">Verify Doctors</a>
            <a href="/admin/audit-logs.html">Audit Logs</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Mobile top bar -->
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">Manage Bookings</span>
            </div>

            <h2>Manage Bookings</h2>
            <br>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient</th>
                            <th>Test</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token = localStorage.getItem('token');
        const role  = localStorage.getItem('role');
        if (!token || role !== 'ADMIN') window.location.href = '/login.html';

        const headers = {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        async function loadBookings() {
            const bookings = await fetch('/api/admin/bookings', { headers }).then(r => r.json());
            const tbody = document.getElementById('bookingsTable');
            tbody.innerHTML = '';
            bookings.forEach(booking => {
                tbody.innerHTML += `
                    <tr>
                        <td>${booking.id}</td>
                        <td>${booking.patient.name}</td>
                        <td>${booking.test.testName}</td>
                        <td>${booking.bookingDate}</td>
                        <td>${booking.status}</td>
                        <td>
                            ${booking.status === 'BOOKED'
                                ? `<button class="btn btn-sm" onclick="completeBooking(${booking.id})">Mark Complete</button>`
                                : '✅ Completed'}
                        </td>
                    </tr>`;
            });
        }

        async function completeBooking(id) {
            await fetch('/api/admin/bookings/' + id + '/status?status=COMPLETED', { method: 'PUT', headers });
            loadBookings();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadBookings();
    </script>
</body>
</html>
