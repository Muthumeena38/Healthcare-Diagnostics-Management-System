<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <p id="adminName"></p>
            <a href="/admin/dashboard.html">Dashboard</a>
            <a href="/admin/tests.html">Manage Tests</a>
            <a href="/admin/reports.html">Manage Reports</a>
            <a href="/admin/bookings.html">Manage Bookings</a>
            <a href="/admin/users.html">Manage Users</a>
            <a href="/admin/verify-doctors.html">Verify Doctors</a>
            <a href="/admin/audit-logs.html">Audit Logs</a>
            <a href="#" onclick="toggleDarkMode()" id="darkModeBtn">🌙 Dark Mode</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>

        </div>

        <div class="main-content">
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">Admin Dashboard</span>
            </div>

            <h2>Welcome to Admin Dashboard</h2>
            <br>
            <div class="cards">
                <div class="card">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
                <div class="card">
                    <h3 id="totalTests">0</h3>
                    <p>Total Tests</p>
                </div>
                <div class="card">
                    <h3 id="totalReports">0</h3>
                    <p>Total Reports</p>
                </div>
                <div class="card">
                    <h3 id="totalBookings">0</h3>
                    <p>Total Bookings</p>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token = localStorage.getItem('token');
        const role  = localStorage.getItem('role');
        const name  = localStorage.getItem('name');

        if (!token || role !== 'ADMIN') window.location.href = '/login.html';

        document.getElementById('adminName').innerText = 'Hello, ' + name;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        async function loadDashboard() {
            const headers = { 'Authorization': 'Bearer ' + token };
            const users    = await fetch('/api/admin/users',    { headers }).then(r => r.json());
            const tests    = await fetch('/api/admin/tests',    { headers }).then(r => r.json());
            const reports  = await fetch('/api/admin/reports',  { headers }).then(r => r.json());
            const bookings = await fetch('/api/admin/bookings', { headers }).then(r => r.json());

            document.getElementById('totalUsers').innerText    = users.length;
            document.getElementById('totalTests').innerText    = tests.length;
            document.getElementById('totalReports').innerText  = reports.length;
            document.getElementById('totalBookings').innerText = bookings.length;
        }

        function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark);
    document.getElementById('darkModeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
}

if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkModeBtn').innerText = '☀️ Light Mode';
}

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadDashboard();
    </script>
</body>
</html>
