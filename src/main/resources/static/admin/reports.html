<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reports</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>DiagnoCare</h2>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <a href="/admin/dashboard.html">Dashboard</a>
            <a href="/admin/tests.html">Manage Tests</a>
            <a href="/admin/reports.html">Manage Reports</a>
            <a href="/admin/bookings.html">Manage Bookings</a>
            <a href="/admin/users.html">Manage Users</a>
            <a href="/admin/verify-doctors.html">Verify Doctors</a>
            <a href="/admin/audit-logs.html">Audit Logs</a>
            <a href="#" onclick="logout()" class="btn logout-btn">Logout</a>
        </div>

        <div class="main-content">
            <div class="mobile-topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="mobile-title">Manage Reports</span>
            </div>

            <h2>Manage Reports</h2>
            <br>

            <!-- Upload Report Form -->
            <div class="form-card">
                <h3>Upload Report</h3>
                <br>
                <div class="form-group">
                    <label>Health ID</label>
                    <input type="text" id="healthId" placeholder="e.g. DC-2026-00001" maxlength="14"
                        oninput="this.value = this.value.toUpperCase()">
                </div>
                <div class="form-group">
                    <label>Test ID</label>
                    <input type="number" id="testId" placeholder="Enter test ID">
                </div>
                <div class="form-group">
                    <label>Remarks</label>
                    <input type="text" id="remarks" placeholder="Enter remarks">
                </div>
                <div class="form-group">
                    <label>Report File (PDF)</label>
                    <input type="file" id="reportFile" accept=".pdf">
                </div>
                <button class="btn" onclick="uploadReport()">Upload Report</button>
                <div id="upload-msg" class="success-msg"></div>
            </div>

            <!-- Reports Table -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient</th>
                            <th>Test</th>
                            <th>Uploaded By</th>
                            <th>Date</th>
                            <th>Remarks</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <script>
        const token = localStorage.getItem('token');
        const role  = localStorage.getItem('role');
        if (!token || role !== 'ADMIN') window.location.href = '/login.html';

        const headers = { 'Authorization': 'Bearer ' + token };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('overlay-show');
        }

        async function loadReports() {
            const reports = await fetch('/api/admin/reports', { headers }).then(r => r.json());
            const tbody = document.getElementById('reportsTable');
            tbody.innerHTML = '';
            reports.forEach(report => {
                tbody.innerHTML += `
                    <tr>
                        <td>${report.id}</td>
                        <td>${report.patient.name}</td>
                        <td>${report.test.testName}</td>
                        <td>${report.uploadedBy.name}</td>
                        <td>${report.uploadDate || 'N/A'}</td>
                        <td>${report.remarks || 'N/A'}</td>
                        <td class="action-cell">
                            <a href="/api/admin/reports/${report.id}/view" target="_blank"
                                class="btn btn-sm">View PDF</a>
                            <button class="btn btn-sm btn-danger"
                                onclick="deleteReport(${report.id})">Delete</button>
                        </td>
                    </tr>`;
            });
        }

        async function uploadReport() {
            const healthId = document.getElementById('healthId').value.trim();
            const pattern  = /^DC-\d{4}-\d{5}$/;
            if (!healthId)             { alert('Please enter Health ID'); return; }
            if (!pattern.test(healthId)) { alert('Invalid format! Use DC-YYYY-NNNNN (e.g. DC-2026-00001)'); return; }

            const testId  = document.getElementById('testId').value;
            const remarks = document.getElementById('remarks').value;
            const file    = document.getElementById('reportFile').files[0];

            const formData = new FormData();
            formData.append('healthId', healthId);
            formData.append('testId', testId);
            formData.append('remarks', remarks);
            formData.append('file', file);

            const response = await fetch('/api/admin/reports/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });

            if (response.ok) {
                document.getElementById('upload-msg').innerText = 'Report uploaded successfully!';
                loadReports();
            }
        }

        async function deleteReport(id) {
            await fetch('/api/admin/reports/' + id, { method: 'DELETE', headers });
            loadReports();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadReports();
    </script>
</body>
</html>
