<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - DiagnoCare</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container">
    <div class="auth-box">
        <h1>DiagnoCare</h1>
        <h2>Reset Password</h2>
        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>
        <button class="btn" onclick="resetPassword()">Reset Password</button>
    </div>
</div>
<script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
        document.getElementById('error-msg').innerText = 'Invalid reset link!';
    }

    async function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!newPassword || !confirmPassword) { alert('Please fill all fields'); return; }
        if (newPassword !== confirmPassword) { alert('Passwords do not match!'); return; }

        const response = await fetch('/api/auth/reset-password?token=' + token + '&newPassword=' + newPassword, {
            method: 'POST'
        });
        const data = await response.json();
        if (response.ok) {
            document.getElementById('success-msg').innerText = data.message;
            document.getElementById('error-msg').innerText = '';
            setTimeout(() => window.location.href = '/login.html', 2000);
        } else {
            document.getElementById('error-msg').innerText = data.message;
        }
    }
</script>
</body>
</html>
